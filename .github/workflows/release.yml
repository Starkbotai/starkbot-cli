name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-aarch64
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: crates/starkbot-tauri/frontend
        run: |
          npm ci
          npm run build

      - name: Build
        run: cargo build --release -p starkbot-tauri --target ${{ matrix.target }}
        shell: bash

      - name: Package (unix)
        if: matrix.ext == 'tar.gz'
        run: |
          ARCHIVE="starkbot-${{ github.ref_name }}-${{ matrix.name }}"
          mkdir "$ARCHIVE"
          cp target/${{ matrix.target }}/release/starkbot-gui "$ARCHIVE/"
          cp README.md "$ARCHIVE/" || true
          cp -r personas "$ARCHIVE/" || true
          cp -r skills "$ARCHIVE/" || true
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          echo "ASSET=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.ext == 'zip'
        run: |
          $ARCHIVE = "starkbot-${{ github.ref_name }}-${{ matrix.name }}"
          New-Item -ItemType Directory -Path $ARCHIVE
          Copy-Item "target/${{ matrix.target }}/release/starkbot-gui.exe" "$ARCHIVE/"
          Copy-Item "README.md" "$ARCHIVE/" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "personas" "$ARCHIVE/" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "skills" "$ARCHIVE/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$ARCHIVE" -DestinationPath "${ARCHIVE}.zip"
          echo "ASSET=${ARCHIVE}.zip" >> $env:GITHUB_ENV
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: starkbot-${{ matrix.name }}
          path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum starkbot-* > checksums-${{ github.ref_name }}.sha256
          cat checksums-${{ github.ref_name }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/starkbot-*
            artifacts/checksums-*
